<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Love Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="header">
            <span>TOCANDO DA SUA PLAYLIST</span>
            <p>Para o meu amor ❤️</p>
        </div>

        <div class="album-wrapper">
            <img src="sua-foto.jpg" id="album-cover" alt="Nossa Foto">
        </div>

        <div class="track-info">
            <div class="text">
                <h1 id="track-title">Nossa Música</h1>
                <p id="track-artist">Wesley & Thayssa</p>
            </div>
            <button class="heart-btn">♥</button>
        </div>

        <div class="description-box">
            <p>"Essa música me lembra de quando começamos. Você é o meu lugar favorito! ."</p>
        </div>

        <div class="player-container">
            <div class="progress-area" id="progress-area">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <div class="time-stamps">
                <span id="current-time">0:00</span>
                <span id="total-duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="secondary">🔀</button>
            <button class="nav-btn">⏮</button>
            <button class="play-pause" id="play-pause-btn">▶</button>
            <button class="nav-btn">⏭</button>
            <button class="secondary">🔁</button>
        </div>

        <audio id="main-audio" src="musica.mp3"></audio>
    </div>

    <script src="script.js"></script>
</body>
</html>
